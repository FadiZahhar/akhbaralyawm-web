<svg xmlns="http://www.w3.org/2000/svg" width="900" height="232" viewBox="0 0 900 232">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f2027"/>
      <stop offset="50%" stop-color="#203a43"/>
      <stop offset="100%" stop-color="#2c5364"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2FA14B"/>
      <stop offset="100%" stop-color="#56d879"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.08)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <rect width="900" height="232" rx="12" fill="url(#bg)"/>
  <rect width="900" height="116" rx="12" fill="url(#shine)"/>
  <!-- Decorative circles -->
  <circle cx="780" cy="50" r="120" fill="rgba(47,161,75,0.08)"/>
  <circle cx="820" cy="180" r="80" fill="rgba(47,161,75,0.05)"/>
  <circle cx="100" cy="200" r="60" fill="rgba(255,255,255,0.03)"/>
  <!-- Left accent bar -->
  <rect x="40" y="60" width="4" height="112" rx="2" fill="url(#accent)"/>
  <!-- Text content -->
  <text x="64" y="100" font-family="Arial,Helvetica,sans-serif" font-size="28" font-weight="bold" fill="#ffffff" letter-spacing="1">مساحة إعلانية</text>
  <text x="64" y="135" font-family="Arial,Helvetica,sans-serif" font-size="16" fill="rgba(255,255,255,0.6)">Advertising Space — 900 × 232</text>
  <text x="64" y="162" font-family="Arial,Helvetica,sans-serif" font-size="13" fill="rgba(255,255,255,0.35)">Your brand could be here</text>
  <!-- CTA button -->
  <rect x="64" y="176" width="140" height="36" rx="18" fill="url(#accent)"/>
  <text x="134" y="200" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="bold" fill="#ffffff">تواصل معنا</text>
  <!-- Right side decorative elements -->
  <rect x="680" y="85" width="180" height="62" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="770" y="112" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="rgba(255,255,255,0.4)">أخبار اليوم</text>
  <text x="770" y="135" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="18" font-weight="bold" fill="url(#accent)">AKHBAR ALYAWM</text>
</svg>
