  </defs>
  <rect width="900" height="232" rx="12" fill="url(#bg2)"/>
  <!-- Geometric pattern -->
  <rect x="0" y="0" width="900" height="232" rx="12" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
