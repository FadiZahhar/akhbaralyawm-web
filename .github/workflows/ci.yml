name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  quality:
    name: Lint and Build
    runs-on: ubuntu-latest
    env:
      API_BASE_URL: ${{ vars.API_BASE_URL }}
      NEXT_PUBLIC_ASSET_HOST: ${{ vars.NEXT_PUBLIC_ASSET_HOST }}
      NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'http://localhost:3000' }}
      AKHBAR_PREVIEW_SHARED_SECRET: ${{ secrets.AKHBAR_PREVIEW_SHARED_SECRET || 'CHANGE_ME' }}
      API_CMS_PAGE_PATH: /v1/pages/by-id.ashx
      API_AUTHOR_ARTICLES_PATH: /v1/news.ashx
      API_AUTHOR_QUERY_KEY: author
      AUTHOR_ARCHIVE_PAGE_SIZE: 12
      CATEGORY_ARCHIVE_PAGE_SIZE: 12
      SEARCH_PAGE_SIZE: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  seo-pagination:
    name: SEO Pagination Check
    runs-on: ubuntu-latest
    needs: quality
    if: ${{ vars.API_BASE_URL != '' && vars.NEXT_PUBLIC_ASSET_HOST != '' }}
    env:
      API_BASE_URL: ${{ vars.API_BASE_URL }}
      NEXT_PUBLIC_ASSET_HOST: ${{ vars.NEXT_PUBLIC_ASSET_HOST }}
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      AKHBAR_PREVIEW_SHARED_SECRET: ${{ secrets.AKHBAR_PREVIEW_SHARED_SECRET || 'CHANGE_ME' }}
      API_CMS_PAGE_PATH: /v1/pages/by-id.ashx
      API_AUTHOR_ARTICLES_PATH: /v1/news.ashx
      API_AUTHOR_QUERY_KEY: author
      AUTHOR_ARCHIVE_PAGE_SIZE: 12
      CATEGORY_ARCHIVE_PAGE_SIZE: 12
      SEARCH_PAGE_SIZE: 12
      SEO_CHECK_BASE_URL: http://localhost:3000
      SEO_CHECK_QUERY: لبنان
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Start app
        run: npm run start &

      - name: Wait for app
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:3000/ > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "App did not start in time"
          exit 1

      - name: Run SEO pagination check
        run: npm run seo:pagination-check -- --base http://localhost:3000
